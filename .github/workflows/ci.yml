name: Xiezhi CI

on:
  push:
    paths:
      - "xiezhi/**"
  pull_request:
    paths:
      - "xiezhi/**"

jobs:
  validate:
    name: Validate Xiezhi Prototype
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Xiezhi checks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x xiezhi/scripts/check.sh xiezhi/scripts/release-preflight.sh
          xiezhi/scripts/check.sh
