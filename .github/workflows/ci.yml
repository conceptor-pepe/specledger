name: SpecLedger CI

on:
  push:
    paths:
      - "specledger/**"
  pull_request:
    paths:
      - "specledger/**"

jobs:
  validate:
    name: Validate SpecLedger Prototype
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SpecLedger checks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x specledger/scripts/check.sh specledger/scripts/release-preflight.sh
          specledger/scripts/check.sh
